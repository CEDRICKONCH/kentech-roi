<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}Kentech ROI{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css"/>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="brand">
        <span class="brand-k">K</span>ENTECH
        <span class="brand-sub">ROI Diagnostic</span>
      </a>
      <div class="nav-links">
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Questionnaire</a>
        <a href="/entreprises" class="{% if '/entreprises' in request.url.path %}active{% endif %}">Entreprises</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>© 2025 Kentech — Maintenance Prédictive &amp; Connectée</p>
  </footer>
</body>
</html>
