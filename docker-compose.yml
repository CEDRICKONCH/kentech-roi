services:

  # ── Base de données MySQL ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: kentech_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql        # données persistantes
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - kentech_net

  # ── Application FastAPI ──────────────────────────────────────────────────
  app:
    build: .
    container_name: kentech_app
    restart: unless-stopped
    env_file: .env                       # lit toutes les variables depuis .env
    environment:
      DB_HOST: db                        # override : pointe sur le service Docker
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy       # attend que MySQL soit prêt
    networks:
      - kentech_net

volumes:
  mysql_data:
    driver: local

networks:
  kentech_net:
    driver: bridge
